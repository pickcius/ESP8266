{% extends "base.html" %}
{% block content %}
<h2>Editar Dispositivo</h2>
<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <label for="name">Nome do Dispositivo</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ device.name }}" required>
    </div>
    <div class="form-group">
        <label for="topic">Tópico MQTT</label>
        <input type="text" class="form-control" id="topic" name="topic" value="{{ device.topic }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
</form>
{% endblock %}
